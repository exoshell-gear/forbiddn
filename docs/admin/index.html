<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>forbiddn — who are you?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22ff88;
      --green-dim: rgba(34, 255, 136, 0.45);
      --green-faint: rgba(34, 255, 136, 0.08);
      --green-line: rgba(34, 255, 136, 0.18);
      --white: #F0EEE9;
      --white-dim: rgba(240, 238, 233, 0.55);
      --white-faint: rgba(240, 238, 233, 0.15);
      --ink: #080C09;
      --ink-mid: #0E1410;
    }

    body {
      background: var(--ink);
      color: var(--white);
      font-family: 'Crimson Text', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      display: block;
      height: 2px;
      background: var(--green);
      width: 100%;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
    }

    .box {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .mask {
      font-size: 2.2rem;
      display: block;
      margin-bottom: 32px;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 400;
      font-style: italic;
      color: var(--white);
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .subheadline {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--white-faint);
      margin-bottom: 44px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .field {
      width: 100%;
      background: var(--ink-mid);
      border: 1px solid rgba(240, 238, 233, 0.08);
      color: var(--white);
      font-family: 'Crimson Text', serif;
      font-size: 1rem;
      padding: 14px 44px 14px 16px;
      outline: none;
      text-align: center;
      letter-spacing: 0.08em;
      transition: border-color 0.2s;
    }

    .field:focus { border-color: var(--white-faint); }
    .field::placeholder { color: var(--white-faint); font-style: italic; }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--white-faint);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      transition: color 0.2s, opacity 0.2s;
      line-height: 1;
    }

    .toggle-pw:hover { color: var(--white-dim); }
    .toggle-pw.active { color: var(--green); opacity: 1; }

    .submit {
      width: 100%;
      background: transparent;
      border: 1px solid var(--green-line);
      color: var(--green-dim);
      font-family: 'Playfair Display', serif;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 32px;
    }

    .submit:hover { background: var(--green); border-color: var(--green); color: var(--ink); }

    .response {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--green-dim);
      min-height: 28px;
      line-height: 1.5;
    }

    .response.flash {
      animation: flash 0.3s ease;
    }

    @keyframes flash {
      0% { opacity: 0; transform: translateY(4px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .back {
      display: inline-block;
      margin-top: 52px;
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--white-faint);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back:hover { color: var(--green-dim); }
  </style>
</head>
<body>
  <div class="box">
    <span class="mask">🎭</span>
    <p class="headline">honestly? if you can get in you probably deserve it.</p>
    <p class="subheadline">i won't even be mad.</p>

    <div class="input-wrap">
      <input
        class="field"
        type="password"
        id="passwordField"
        placeholder="give it your best shot"
        onkeydown="if(event.key==='Enter') attempt()"
        autocomplete="off"
      />
      <button class="toggle-pw" onclick="togglePw()" id="toggleBtn" title="Show password">👁</button>
    </div>

    <button class="submit" onclick="attempt()">Enter</button>

    <div class="response" id="response"></div>

    <a class="back" href="/">← go back to reading</a>
  </div>

  <script>
    const responses = [
      "incorrect.",
      "you really think you can guess my password?",
      "try again. wait.. why do i want you to try again?",
      "just give up.",
      "i love watching you fail.",
      "i could do this all day. but i won't.",
      "what if there IS no password and i am just wasting your time?",
      "do you have nothing better to do?",
      "try 'password'.",
      "try entering your deepest darkest secret.",
      "you tryna break in?",
      "Nobody ever saw my face... and lived. 😈",
      "i am going to publish that along with your full name and ip address. 😈",
      "jokes aside, you're really not supposed to be snooping around. please go read some more.",
      "Just STOP.",
      "Who do you hate the most?",
      "incorrect password. fuck off.",
      "Come on in! SYKE! Stay the fuck out. 😈",
      "what exactly are you hoping to find?",
    ];

    let lastIndex = -1;

    function attempt() {
      const field = document.getElementById('passwordField');
      field.value = '';
      field.blur();

      let idx;
      do { idx = Math.floor(Math.random() * responses.length); }
      while (idx === lastIndex && responses.length > 1);
      lastIndex = idx;

      const el = document.getElementById('response');
      el.classList.remove('flash');
      void el.offsetWidth;
      el.textContent = responses[idx];
      el.classList.add('flash');

      setTimeout(() => field.focus(), 100);
    }

    function togglePw() {
      const field = document.getElementById('passwordField');
      const btn = document.getElementById('toggleBtn');
      if (field.type === 'password') {
        field.type = 'text';
        btn.classList.add('active');
      } else {
        field.type = 'password';
        btn.classList.remove('active');
      }
      field.focus();
    }

    document.getElementById('passwordField').focus();
  </script>
</body>
</html>
