<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>forbiddn</title>
  <meta name="description" content="Secrets, confessions, and dark fantasies. You figure out which is which." />
  <meta property="og:title" content="forbiddn" />
  <meta property="og:description" content="Secrets, confessions, and dark fantasies. You figure out which is which." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22ff88;
      --green-dim: rgba(34, 255, 136, 0.45);
      --green-faint: rgba(34, 255, 136, 0.12);
      --green-line: rgba(34, 255, 136, 0.18);
      --white: #F0EEE9;
      --white-dim: rgba(240, 238, 233, 0.55);
      --white-faint: rgba(240, 238, 233, 0.15);
      --ink: #080C09;
      --ink-mid: #0E1410;
      --ink-card: #111710;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--ink);
      color: var(--white);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 18px;
      line-height: 1.7;
      min-height: 100vh;
    }

    body::before {
      content: '';
      display: block;
      height: 2px;
      background: var(--green);
      width: 100%;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
    }

    /* ── HEADER ── */
    header {
      padding: 80px 24px 64px;
      text-align: center;
      border-bottom: 1px solid var(--green-line);
      position: relative;
    }

    .site-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 28px;
      display: block;
    }

    .mask {
      font-size: 2rem;
      display: block;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.6rem, 7vw, 5rem);
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.01em;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 20px;
    }

    .subtext {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.2vw, 1.15rem);
      color: var(--white-dim);
      letter-spacing: 0.03em;
      margin-bottom: 40px;
    }

    .admin-link {
      display: inline-block;
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--white-faint);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    .admin-link:hover { color: var(--green-dim); }

    /* ── FEED ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    .feed {
      columns: 2;
      column-gap: 28px;
    }

    @media (max-width: 700px) {
      .feed { columns: 1; }
    }

    .entry {
      break-inside: avoid;
      margin-bottom: 28px;
      border: 1px solid var(--green-line);
      padding: 28px 26px 22px;
      background: var(--ink-card);
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }

    .entry:hover {
      border-color: var(--green-dim);
      background: var(--ink-mid);
    }

    .entry-date {
      font-family: 'Playfair Display', serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      opacity: 0.6;
      margin-bottom: 12px;
    }

    .entry-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 2.2vw, 1.4rem);
      font-weight: 500;
      line-height: 1.3;
      color: var(--white);
      margin-bottom: 12px;
    }

    .entry-body {
      font-family: 'Crimson Text', serif;
      font-size: 1rem;
      color: var(--white-dim);
      line-height: 1.75;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .entry-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--green-line);
    }

    .read-more {
      font-family: 'Playfair Display', serif;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
      opacity: 0.7;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .read-more:hover { opacity: 1; }

    .share-btn {
      background: none;
      border: none;
      color: var(--white-faint);
      cursor: pointer;
      font-size: 0.82rem;
      font-family: 'Crimson Text', serif;
      font-style: italic;
      transition: color 0.2s;
      padding: 0;
    }

    .share-btn:hover { color: var(--green-dim); }

    /* ── SINGLE ENTRY ── */
    .single-view {
      display: none;
      max-width: 660px;
      margin: 0 auto;
      padding: 60px 0 100px;
    }

    .single-view.active { display: block; }
    .feed-view.hidden { display: none; }

    .back-btn {
      background: none;
      border: none;
      color: var(--white-faint);
      cursor: pointer;
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 1rem;
      padding: 0;
      margin-bottom: 52px;
      transition: color 0.2s;
      display: block;
    }

    .back-btn:hover { color: var(--green-dim); }

    .single-date {
      font-family: 'Playfair Display', serif;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green);
      opacity: 0.6;
      margin-bottom: 18px;
    }

    .single-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      font-weight: 400;
      line-height: 1.15;
      color: var(--white);
      margin-bottom: 44px;
      font-style: italic;
    }

    .single-body {
      font-family: 'Crimson Text', serif;
      font-size: 1.18rem;
      line-height: 1.88;
      color: var(--white-dim);
    }

    .single-body p { margin-bottom: 1.5em; }

    .single-footer {
      margin-top: 52px;
      padding-top: 24px;
      border-top: 1px solid var(--green-line);
      display: flex;
      justify-content: flex-end;
    }

    .share-btn-large {
      background: none;
      border: 1px solid var(--green-line);
      color: var(--white-faint);
      cursor: pointer;
      font-size: 0.78rem;
      font-family: 'Playfair Display', serif;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: all 0.2s;
      padding: 10px 20px;
    }

    .share-btn-large:hover {
      border-color: var(--green-dim);
      color: var(--green);
    }

    /* ── STATES ── */
    .loading, .empty {
      text-align: center;
      padding: 80px 24px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--white-faint);
      font-size: 1.1rem;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green-faint);
      border: 1px solid var(--green-line);
      color: var(--green);
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 0.95rem;
      padding: 10px 22px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    footer {
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--green-line);
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--white-faint);
    }
  </style>
</head>
<body>

  <header>
    <span class="mask">🎭</span>
    <span class="site-name">The Forbidden Diary</span>
    <h1>Secrets, confessions,<br>and dark fantasies.</h1>
    <p class="subtext">You figure out which is which.</p>
    <a class="admin-link" href="/admin">are you the author?</a>
  </header>

  <main>
    <div class="feed-view" id="feedView">
      <div class="feed" id="feed">
        <div class="loading">Loading…</div>
      </div>
    </div>

    <div class="single-view" id="singleView">
      <button class="back-btn" onclick="showFeed()">← All entries</button>
      <div class="single-date" id="singleDate"></div>
      <h2 class="single-title" id="singleTitle"></h2>
      <div class="single-body" id="singleBody"></div>
      <div class="single-footer">
        <button class="share-btn-large" onclick="shareEntry()">Copy link</button>
      </div>
    </div>
  </main>

  <footer>The author remains unknown.</footer>

  <div class="toast" id="toast"></div>

  <script>
    let allEntries = [];
    let currentSlug = null;

    async function loadEntries() {
      try {
        const res = await fetch('/api/posts');
        if (!res.ok) throw new Error();
        const posts = await res.json();
        allEntries = posts
          .map(p => parseEntry(p.slug, p.content))
          .sort((a, b) => b.date.localeCompare(a.date));
        renderFeed(allEntries);
      } catch {
        document.getElementById('feed').innerHTML =
          '<div class="empty">The diary is sealed shut.</div>';
      }
    }

    function parseEntry(slug, text) {
      const lines = text.split('\n');
      let meta = {}, bodyStart = 0;
      if (lines[0] === '---') {
        for (let i = 1; i < lines.length; i++) {
          if (lines[i] === '---') { bodyStart = i + 1; break; }
          const [k, ...v] = lines[i].split(':');
          meta[k.trim()] = v.join(':').trim().replace(/^"|"$/g, '');
        }
      }
      const title = meta.title || slug.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/-/g, ' ');
      const date  = meta.date  || slug.slice(0, 10);
      const body  = lines.slice(bodyStart).join('\n').trim();
      return { slug, title, date, body };
    }

    function formatDate(d) {
      return new Date(d + 'T12:00:00').toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function renderFeed(entries) {
      const feed = document.getElementById('feed');
      if (!entries.length) {
        feed.innerHTML = '<div class="empty">Nothing yet. Come back when the ink is dry.</div>';
        return;
      }
      feed.innerHTML = entries.map(e => `
        <article class="entry" onclick="showEntry('${e.slug}')">
          <div class="entry-date">${formatDate(e.date)}</div>
          <h2 class="entry-title">${e.title}</h2>
          <p class="entry-body">${e.body.replace(/<[^>]+>/g, '').slice(0, 300)}</p>
          <div class="entry-footer">
            <a class="read-more" href="#${e.slug}" onclick="event.stopPropagation();showEntry('${e.slug}')">Read →</a>
            <button class="share-btn" onclick="event.stopPropagation();shareBySlug('${e.slug}')">copy link</button>
          </div>
        </article>
      `).join('');
    }

    function showEntry(slug) {
      const e = allEntries.find(e => e.slug === slug);
      if (!e) return;
      currentSlug = slug;
      document.getElementById('singleDate').textContent = formatDate(e.date);
      document.getElementById('singleTitle').textContent = e.title;
      document.getElementById('singleBody').innerHTML =
        e.body.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
      document.getElementById('feedView').classList.add('hidden');
      document.getElementById('singleView').classList.add('active');
      window.history.pushState({}, '', `#${slug}`);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showFeed() {
      document.getElementById('feedView').classList.remove('hidden');
      document.getElementById('singleView').classList.remove('active');
      window.history.pushState({}, '', window.location.pathname);
      currentSlug = null;
    }

    function shareEntry() { shareBySlug(currentSlug); }

    function shareBySlug(slug) {
      const url = `${location.origin}${location.pathname}#${slug}`;
      navigator.clipboard.writeText(url).then(() => showToast('link copied.'));
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    window.addEventListener('popstate', () => { if (!location.hash) showFeed(); });

    loadEntries().then(() => {
      const hash = location.hash.replace('#', '');
      if (hash) { const e = allEntries.find(e => e.slug === hash); if (e) showEntry(hash); }
    });
  </script>
</body>
</html>
